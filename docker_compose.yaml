version: '3.8'

services:
  scout-platform:
    build: .
    volumes:
      # Maps your local codebase to the container's working directory
      - .:/app
      # Anonymous volume prevents your local pycache from conflicting with Docker's pycache
      - /app/__pycache__
    env_file:
      - .env
    # Keeps the container shell active so you can trigger commands
    stdin_open: true
    tty: true